<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dispatch</title>
<meta name="viewport" content="width=900,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --panel-2: #1c2230;
    --line: #262d3b;
    --text: #e6e9ef;
    --dim: #98a0ad;
    --accent: #6aa9ff;
    --ok: #4ec9a4;
    --warn: #f0b95b;
    --danger: #f06464;
    --pulse-red: #f06464;
    --pulse-green: #4ec9a4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
               font-family: -apple-system, "SF Pro Text", system-ui, sans-serif; font-size: 14px; }
  header { padding: 14px 22px; border-bottom: 1px solid var(--line);
           display: flex; align-items: center; gap: 14px; background: var(--panel); position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: .3px; }
  header .status { font-size: 12px; color: var(--dim); margin-left: auto; display:flex; gap:14px; align-items:center; }
  header .pill { padding: 3px 8px; border-radius: 10px; background: var(--panel-2);
                 font-variant-numeric: tabular-nums; }
  main { display: grid; grid-template-columns: 1.4fr 1fr; gap: 0; min-height: calc(100vh - 50px); }
  section { padding: 18px 22px; border-right: 1px solid var(--line); }
  section + section { border-right: none; }
  h2 { font-size: 12px; text-transform: uppercase; color: var(--dim); letter-spacing: .8px;
       margin: 4px 0 14px 0; font-weight: 600; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
          padding: 12px 14px; margin-bottom: 10px; }
  .card.alert { border-color: #5a2b2b; background: linear-gradient(180deg, #2a1818 0%, #1a1212 100%); }
  .card.complete { border-color: #2a4a3c; background: linear-gradient(180deg, #122520 0%, #11201c 100%); }
  .card.elevated { border-color: #2f3a55; }
  .card .head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .card .head .cs { font-weight: 600; font-size: 13.5px; }
  .card .head .cs .sn { font-weight: 500; color: var(--accent); font-size: 13px; }
  .card .vibe { font-size: 11.5px; color: var(--dim); font-style: italic; margin: 4px 0 6px 0; }
  .card .head .proj { color: var(--dim); font-size: 12px; }
  .card .head .badge { margin-left: auto; font-size: 11px; padding: 2px 7px; border-radius: 8px;
                       background: var(--panel-2); color: var(--dim); }
  .card .head .badge.live { color: var(--ok); }
  .card .head .badge.alert { color: var(--danger); }
  .card .head .badge.complete { color: var(--ok); }
  .card .title { color: var(--text); font-size: 13px; margin-bottom: 4px; }
  .card .quote { color: var(--dim); font-size: 12.5px; font-style: italic;
                 padding: 6px 10px; border-left: 2px solid var(--line); margin: 6px 0 10px 0; }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; }
  button { background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
           padding: 6px 11px; border-radius: 7px; cursor: pointer; font-size: 12.5px;
           font-family: inherit; }
  button:hover { background: #232b3a; }
  button.primary { background: #1d3d70; border-color: #2a4f8a; }
  button.danger { background: #5e2929; border-color: #7a3737; }
  button.ok { background: #1f4838; border-color: #2c5c48; }
  button.ghost { background: transparent; }
  button.big { padding: 10px 16px; font-size: 13.5px; font-weight: 600; }
  .stack-bar { background: linear-gradient(90deg, #3a1e1e 0%, #2a1818 100%);
               border: 1px solid #5a2b2b; padding: 14px 16px; border-radius: 10px;
               display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .stack-bar .lbl { font-weight: 600; font-size: 14px; }
  .stack-bar .count { color: var(--dim); font-size: 12px; }
  .log { font-family: ui-monospace, SF Mono, Menlo, monospace; font-size: 11.5px;
         color: var(--dim); white-space: pre-wrap; line-height: 1.5; max-height: 50vh; overflow-y: auto;
         background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
  .log .self { color: var(--accent); }
  .log .sys { color: var(--dim); }
  .log .hook { color: var(--warn); }
  .log .agent { color: var(--text); }
  .empty { color: var(--dim); font-size: 12.5px; padding: 16px 0; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .toolbar button { font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px;
         background: var(--dim); vertical-align: middle; }
  .dot.alert { background: var(--danger); animation: pulse 1.4s infinite; }
  .dot.complete { background: var(--ok); animation: pulse 1.4s infinite; }
  .dot.elev { background: var(--accent); }
  .dot.muted { background: var(--dim); opacity: 0.5; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
  textarea { width: 100%; background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
             border-radius: 7px; padding: 8px 10px; font: inherit; resize: vertical; min-height: 40px; }
  select { background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
           border-radius: 6px; padding: 6px 9px; font: inherit; }
  .row { display: flex; gap: 8px; align-items: center; }
  details summary { cursor: pointer; color: var(--dim); font-size: 12px; }
  .ts { color: var(--dim); font-variant-numeric: tabular-nums; }

  /* ---- token quota meter ---- */
  .quota-pill { font-variant-numeric: tabular-nums; cursor: pointer; transition: background .15s; }
  .quota-pill.tier-normal     { background: #1f3b2c; color: #a8e6c8; }
  .quota-pill.tier-nudge      { background: #4a3a14; color: #f6d27a; }
  .quota-pill.tier-enforce    { background: #5a3315; color: #ffb574; }
  .quota-pill.tier-emergency  { background: #5e2929; color: #ff9b9b;
                                animation: pulse 1.4s infinite; }

  .quota-zone { margin-bottom: 18px; }
  .quota-zone:empty { display: none; }
  .quota-card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
                padding: 14px 16px; }
  .quota-card.tier-nudge      { border-color: #6a541e; }
  .quota-card.tier-enforce    { border-color: #7a4920; }
  .quota-card.tier-emergency  { border-color: #7a3737;
                                background: linear-gradient(180deg, #2a1818 0%, #1a1212 100%); }
  .quota-card .qhead { display: flex; align-items: baseline; gap: 14px; margin-bottom: 12px; }
  .quota-card .qhead .tag { font-weight: 600; font-size: 13.5px; }
  .quota-card .qhead .tier-label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px;
                                   padding: 2px 8px; border-radius: 8px; background: var(--panel-2);
                                   color: var(--dim); }
  .quota-card .qhead .resets { margin-left: auto; color: var(--dim); font-size: 12px; }
  .quota-card .meter-row { display: grid; grid-template-columns: 70px 1fr 130px;
                           gap: 10px; align-items: center; margin: 6px 0; font-size: 12.5px; }
  .quota-card .meter-row .lbl { color: var(--dim); font-size: 12px; }
  .quota-card .meter-row .nums { text-align: right; color: var(--dim);
                                 font-variant-numeric: tabular-nums; }
  .quota-card .bar { background: var(--panel-2); height: 8px; border-radius: 4px; overflow: hidden;
                     border: 1px solid var(--line); }
  .quota-card .bar > div { height: 100%; transition: width .3s ease; border-radius: 3px; }
  .quota-card .bar > div.fill-normal     { background: #4ec9a4; }
  .quota-card .bar > div.fill-nudge      { background: #f0b95b; }
  .quota-card .bar > div.fill-enforce    { background: #f08e4b; }
  .quota-card .bar > div.fill-emergency  { background: #f06464; }
  .quota-card .per-session { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line);
                             font-size: 11.5px; color: var(--dim); }
  .quota-card .per-session .ps-row { display: flex; gap: 10px; justify-content: space-between;
                                     padding: 2px 0; }
  .quota-card .per-session .ps-row .sid { font-family: ui-monospace, monospace; }

  /* ---- features panel (UI toggle switches) ---- */
  .features-panel { background: var(--panel); border: 1px solid var(--line);
                    border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
  .features-panel .fp-head { display: flex; align-items: center; gap: 10px;
                             margin-bottom: 10px; }
  .features-panel .fp-head .title { font-weight: 600; font-size: 13.5px; }
  .features-panel .fp-head .hint { color: var(--dim); font-size: 11.5px;
                                   margin-left: auto; }
  .features-panel .feature-row { display: grid;
                                  grid-template-columns: 46px 1fr auto;
                                  gap: 12px; align-items: center;
                                  padding: 6px 0; }
  .features-panel .feature-row + .feature-row {
                                  border-top: 1px solid var(--line); }
  .features-panel .feature-row .name { font-size: 13px; font-weight: 500; }
  .features-panel .feature-row .desc { color: var(--dim); font-size: 11.5px;
                                       margin-top: 2px; }
  .features-panel .feature-row .ctrl { display: flex; gap: 8px;
                                       align-items: center; }
  .features-panel select.mode-sel { font-size: 11.5px; padding: 3px 6px; }
  .features-panel select.mode-sel:disabled { opacity: 0.4; }
  /* iOS-style toggle */
  .switch { position: relative; display: inline-block;
            width: 38px; height: 22px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .slider { position: absolute; cursor: pointer;
                    top: 0; left: 0; right: 0; bottom: 0;
                    background: #3a3f4d; border-radius: 22px;
                    transition: background .15s; }
  .switch .slider:before { content: ""; position: absolute;
                           height: 16px; width: 16px;
                           left: 3px; bottom: 3px;
                           background: #d0d0d0; border-radius: 50%;
                           transition: transform .15s, background .15s; }
  .switch input:checked + .slider { background: #4ec9a4; }
  .switch input:checked + .slider:before { transform: translateX(16px);
                                           background: white; }
  .switch input:disabled + .slider { opacity: 0.4; cursor: not-allowed; }
  /* gear button + settings popover */
  .gear-btn { background: none; border: 1px solid var(--line); color: var(--ink);
              border-radius: 8px; padding: 3px 9px; cursor: pointer; font-size: 15px;
              line-height: 1.2; transition: background .12s, transform .3s; }
  .gear-btn:hover { background: var(--line); }
  .gear-btn.open { transform: rotate(60deg); }
  .settings-pop { position: fixed; top: 54px; right: 16px; width: 390px;
                  max-height: 76vh; overflow: auto; z-index: 60; margin: 0;
                  display: none; box-shadow: 0 12px 36px rgba(0,0,0,.45); }
  .settings-pop.open { display: block; }
  .settings-backdrop { position: fixed; inset: 0; z-index: 55; display: none; }
  .settings-backdrop.open { display: block; }
</style>
</head>
<body>
<header>
  <h1>🛰  Dispatch</h1>
  <div class="status">
    <span class="pill" id="pill-units">… units</span>
    <span class="pill" id="pill-pending">… pending</span>
    <span class="pill" id="pill-complete">… complete</span>
    <span class="pill" id="pill-channel">channel: …</span>
    <span class="pill quota-pill" id="pill-quota" title="Click for details">quota: …</span>
    <button id="gear-btn" class="gear-btn" title="Features &amp; settings" aria-label="Settings">⚙</button>
  </div>
</header>
<div id="settings-backdrop" class="settings-backdrop"></div>
<main>
  <section>
    <div id="stack-zone"></div>
    <div id="quota-zone" class="quota-zone"></div>
    <div class="toolbar">
      <button id="btn-talk-all" class="primary">🎙 Talk to ALL units (voice)</button>
      <button id="btn-status-check">📊 Status check</button>
      <button id="btn-mute-channel">🔇 Channel</button>
      <button id="btn-mute-all-units">🔇 Mute all</button>
    </div>
    <h2>Roster</h2>
    <div id="roster"></div>
  </section>
  <section>
    <h2>Channel log</h2>
    <div id="log" class="log"></div>
  </section>
</main>
<div id="features-panel" class="features-panel settings-pop"></div>
<script>
const $ = sel => document.querySelector(sel);
let state = null;

async function api(path, opts = {}) {
  const r = await fetch(path, { method: opts.method || 'GET',
                                headers: opts.body ? { 'Content-Type':'application/json' } : {},
                                body: opts.body ? JSON.stringify(opts.body) : undefined });
  if (!r.ok) throw new Error(`${path} ${r.status}`);
  const ct = r.headers.get('content-type') || '';
  return ct.includes('json') ? r.json() : r.text();
}

function fmtTime(ts) {
  const d = new Date(ts * 1000);
  return d.toTimeString().slice(0, 8);
}

function btn(action, arg, label, klass='') {
  const cls = klass ? ` class="${klass}"` : '';
  return `<button${cls} data-action="${action}" data-arg="${esc(arg || '')}">${label}</button>`;
}

function renderRoster(s) {
  const root = $('#roster');
  const r = s.roster || [];
  if (!r.length) {
    root.innerHTML = '<div class="empty">No live claude sessions. Open a terminal and run <code>claude</code>.</div>';
    return;
  }
  root.innerHTML = r.map(u => {
    const cls = ['card'];
    let dot = '<span class="dot"></span>';
    let badge = '';
    let quote = '';
    let actions = '';
    if (u.hook_pending) {
      cls.push('alert');
      dot = '<span class="dot alert"></span>';
      badge = '<span class="badge alert">hook</span>';
      quote = `<div class="quote">wants to: ${esc(u.hook_pending.tool_summary)}</div>`;
      actions += btn('grant_hook', u.hook_pending.id, '✅ Allow', 'ok');
      actions += btn('deny_hook', u.hook_pending.id, '⛔ Deny', 'danger');
    } else if (u.pending) {
      cls.push('alert');
      dot = '<span class="dot alert"></span>';
      badge = '<span class="badge alert">permission</span>';
      quote = `<div class="quote">${esc(u.pending.text)}</div>`;
      actions += btn('grant_unit', u.callsign, '✅ Grant', 'ok');
      actions += btn('deny_unit', u.callsign, '⛔ Deny', 'danger');
    } else if (u.awaiting) {
      cls.push('alert');
      dot = '<span class="dot alert"></span>';
      badge = '<span class="badge alert">question</span>';
      quote = `<div class="quote">${esc(u.awaiting.question)}</div>`;
      actions += btn('dismiss_awaiting', u.callsign, '✓ Mark read');
    } else if (u.completed) {
      cls.push('complete');
      dot = '<span class="dot complete"></span>';
      badge = '<span class="badge complete">done</span>';
      quote = `<div class="quote">${esc(u.completed)}</div>`;
      actions += btn('dismiss_complete', u.callsign, '✓ Acknowledge');
    }
    if (u.elevated) { cls.push('elevated'); badge = '<span class="badge">🔓 elevated</span>' + badge; }
    if (u.muted) { dot = '<span class="dot muted"></span>'; }

    actions += btn('voice_to', u.callsign, '🎙 Voice', 'primary');
    actions += `<button data-action="prompt_transmit" data-arg="${esc(u.callsign)}">💬 Text</button>`;
    actions += btn('toggle_elevated', u.callsign, u.elevated ? '🔒 Revoke elevation' : '🔓 Elevate', 'ghost');
    actions += btn('toggle_mute_unit', u.callsign, u.muted ? '🔊 Unmute' : '🔇 Mute', 'ghost');

    const shortName = u.short_label ? ` · ${esc(u.short_label)}` : '';
    return `
      <div class="${cls.join(' ')}">
        <div class="head">
          ${dot}
          <span class="cs">${u.callsign}<span class="sn">${shortName}</span></span>
          <span class="proj">· ${esc(u.project_label)} · pid ${u.pid}</span>
          ${badge}
        </div>
        <div class="title">${esc(u.title)}</div>
        ${quote}
        <div class="actions">${actions}</div>
      </div>`;
  }).join('');
}

function renderStack(s) {
  const root = $('#stack-zone');
  const pc = s.permission_count || 0;
  if (pc < 2) { root.innerHTML = ''; return; }
  root.innerHTML = `
    <div class="stack-bar">
      <div>
        <div class="lbl">🚨 ${pc} permission asks backed up</div>
        <div class="count">resolve all in one shot</div>
      </div>
      <div class="actions" style="margin-left:auto;">
        <button class="ok big" data-action="grant_all">✅ ALLOW ALL</button>
        <button class="danger big" data-action="deny_all">⛔ DENY ALL</button>
      </div>
    </div>`;
}

function renderHeader(s) {
  $('#pill-units').textContent = `${s.roster.length} units`;
  $('#pill-pending').textContent = `${s.alert_count} alert${s.alert_count===1?'':'s'}`;
  $('#pill-complete').textContent = `${s.complete_count} done`;
  $('#pill-channel').textContent =
    s.channel.busy ? `channel: ▶ ${s.channel.label}` :
    s.channel.queue ? `channel: ${s.channel.queue} queued` :
    s.channel.muted ? `channel: muted` : 'channel: idle';

  // Reflect current mute states in the toolbar buttons.
  const allMuted = s.roster.length > 0 && s.roster.every(u => u.muted);
  $('#btn-mute-all-units').textContent = allMuted ? '🔊 Unmute all units' : '🔇 Mute all units';
  $('#btn-mute-all-units').classList.toggle('primary', allMuted);
  $('#btn-mute-channel').textContent = s.channel.muted ? '🔊 Unmute channel' : '🔇 Mute channel';
  $('#btn-mute-channel').classList.toggle('primary', s.channel.muted);
}

function fmtTokens(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return Math.round(n / 1_000) + 'K';
  return String(n);
}

function fmtResetIn(sec) {
  if (sec <= 0) return 'now';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function renderQuotaHeader(q) {
  const pill = $('#pill-quota');
  if (!q || q.error) {
    pill.textContent = 'quota: —';
    pill.className = 'pill quota-pill';
    pill.title = q && q.error ? q.error : 'quota unavailable';
    return;
  }
  const pct = Math.round((q.pct || 0) * 100);
  const tier = q.tier || 'normal';
  pill.textContent = `quota: ${pct}%  ·  resets ${fmtResetIn(q.reset_5h_in_sec)}`;
  pill.className = `pill quota-pill tier-${tier}`;
  pill.title = `5h: ${Math.round(q.pct_5h*100)}% · Week: ${Math.round(q.pct_7d*100)}% — click for details`;
}

function renderQuotaCard(q) {
  const root = $('#quota-zone');
  if (!q || q.error) { root.innerHTML = ''; return; }
  const band = q.tier || 'normal';
  // Passive meter: surface the card only when usage is elevated — quiet when
  // fine. No banner, no alarm labels, no enforcement (M2 removed). The bands
  // are color only; the ceiling is an estimate.
  if (band === 'normal') { root.innerHTML = ''; return; }

  const p5 = Math.min(100, Math.round((q.pct_5h || 0) * 100));
  const p7 = Math.min(100, Math.round((q.pct_7d || 0) * 100));
  const fill5 = q.pct_5h >= 0.90 ? 'emergency' : q.pct_5h >= 0.80 ? 'enforce'
              : q.pct_5h >= 0.60 ? 'nudge' : 'normal';
  const fill7 = q.pct_7d >= 0.90 ? 'emergency' : q.pct_7d >= 0.80 ? 'enforce'
              : q.pct_7d >= 0.60 ? 'nudge' : 'normal';

  const per = Object.entries(q.per_session || {})
    .sort((a, b) => b[1] - a[1])
    .slice(0, 4);

  root.innerHTML = `
    <div class="quota-card tier-${band}">
      <div class="qhead">
        <span class="tag">📊 Token quota (estimated)</span>
        <span class="tier-label">${Math.round((q.pct||0)*100)}% of est. ceiling</span>
        <span class="resets">5h window resets in ${fmtResetIn(q.reset_5h_in_sec)}</span>
      </div>
      <div class="meter-row">
        <span class="lbl">5h window</span>
        <span class="bar"><div class="fill-${fill5}" style="width:${p5}%"></div></span>
        <span class="nums">${fmtTokens(q.tokens_5h)} / ${fmtTokens(q.ceiling_5h)} (${p5}%)</span>
      </div>
      <div class="meter-row">
        <span class="lbl">7d week</span>
        <span class="bar"><div class="fill-${fill7}" style="width:${p7}%"></div></span>
        <span class="nums">${fmtTokens(q.tokens_7d)} / ${fmtTokens(q.ceiling_7d)} (${p7}%)</span>
      </div>
      ${per.length ? `<div class="per-session">
        <div style="margin-bottom:4px;">Top sessions in 5h window:</div>
        ${per.map(([sid, tok]) => `
          <div class="ps-row">
            <span class="sid">${esc(sid.slice(0, 18))}…</span>
            <span>${fmtTokens(tok)} cost-equiv</span>
          </div>`).join('')}
      </div>` : ''}
    </div>`;
}

// ---- features panel (toggle switches) ----

const FEATURE_META = [
  { id: 'm1_quota_meter',       name: 'M1 · Quota meter',
    desc: 'Scan JSONLs, show pill + gauge, /state quota field',
    hasMode: false },
  { id: 'm3a_subagent_router',  name: 'M3a · Sub-agent router',
    desc: 'Rewrite Task tool model via PreToolUse updatedInput',
    hasMode: 'subagent' },
  { id: 'm3b_prompt_router',    name: 'M3b · Prompt router',
    desc: 'UserPromptSubmit hook hints delegation to cheaper model',
    hasMode: 'prompt' },
];

// Suppress poll-revert for ~2s after a user flips a control, so the 1s
// refresh() polling can't snap a checkbox/select back while the POST that
// applies the change is still in flight. key -> expiry (ms epoch).
const _flipLock = {};
const _isLocked = (key) => Date.now() < (_flipLock[key] || 0);
const lockFlip  = (key) => { _flipLock[key] = Date.now() + 2000; };

// Build the panel structure ONCE. Rebuilding innerHTML on every 1s poll was
// destroying the very controls the user was interacting with (the toggle
// would snap back, dropdowns would close) — so we build once, then reconcile
// values in place on each refresh.
function buildFeaturesPanel(root, fs, modes) {
  const rows = FEATURE_META.map(f => {
    const enabled = !!fs.features[f.id];
    const modeSel = f.hasMode
      ? `<select class="mode-sel" data-mode-source="${f.hasMode}" ${enabled ? '' : 'disabled'}>
           ${modes.map(m =>
             `<option value="${m}" ${fs.routing[f.hasMode + '_mode'] === m ? 'selected' : ''}>${m}</option>`
           ).join('')}
         </select>` : '';
    return `
      <div class="feature-row">
        <label class="switch">
          <input type="checkbox" data-feature="${f.id}" ${enabled ? 'checked' : ''}>
          <span class="slider"></span>
        </label>
        <div>
          <div class="name">${esc(f.name)}</div>
          <div class="desc">${esc(f.desc)}</div>
        </div>
        <div class="ctrl">${modeSel}</div>
      </div>`;
  }).join('');
  root.innerHTML = `
    <div class="fp-head">
      <span class="title">⚙ Features</span>
      <span class="hint">flips take effect immediately — no restart needed</span>
    </div>
    ${rows}
    <div class="fp-head" style="margin-top:14px"><span class="title">App</span></div>
    <div class="feature-row">
      <label class="switch">
        <input type="checkbox" id="hook-toggle">
        <span class="slider"></span>
      </label>
      <div>
        <div class="name">Permission hook</div>
        <div class="desc">Route Claude Code tool approvals through Dispatch (start a new session after enabling)</div>
      </div>
      <div class="ctrl"></div>
    </div>
    <div class="desc" style="padding:10px 2px 2px">Quit: right-click the Dispatch icon in the Dock → Quit.</div>`;
  root.dataset.built = '1';
}

// Reconcile control state from the server WITHOUT touching the DOM the user
// is actively using: skip the focused element, and skip anything just flipped.
function reconcileFeaturesPanel(root, fs, hookInstalled) {
  const ht = root.querySelector('#hook-toggle');
  if (ht && document.activeElement !== ht && !_isLocked('hook')) {
    const want = !!hookInstalled;
    if (ht.checked !== want) ht.checked = want;
  }
  FEATURE_META.forEach(f => {
    const cb = root.querySelector(`input[type="checkbox"][data-feature="${f.id}"]`);
    if (cb && document.activeElement !== cb && !_isLocked(f.id)) {
      const want = !!fs.features[f.id];
      if (cb.checked !== want) cb.checked = want;
    }
    if (f.hasMode) {
      const sel = root.querySelector(`select.mode-sel[data-mode-source="${f.hasMode}"]`);
      if (sel && document.activeElement !== sel && !_isLocked('mode:' + f.hasMode)) {
        const want = fs.routing[f.hasMode + '_mode'];
        if (want && sel.value !== want) sel.value = want;
        sel.disabled = !fs.features[f.id];
      }
    }
  });
}

function renderFeaturesPanel(s) {
  const root = $('#features-panel');
  const fs = s.features_state || { features: {}, routing: {}, valid_routing_modes: [] };
  const modes = fs.valid_routing_modes || ['off','shadow','suggest','auto_notify','auto_silent'];
  if (!root.dataset.built) buildFeaturesPanel(root, fs, modes);
  reconcileFeaturesPanel(root, fs, s.hook_installed);
}

// Delegated toggle/select handlers — wired once, react to dynamic content.
document.addEventListener('change', async (e) => {
  const ht = e.target.closest('#hook-toggle');
  if (ht) {
    lockFlip('hook');
    try {
      await api('/api/toggle_hook', { method: 'POST' });
      refresh();
    } catch (err) {
      ht.checked = !ht.checked;  // revert
      delete _flipLock['hook'];
      alert('Failed to toggle permission hook: ' + err.message);
    }
    return;
  }
  const cb = e.target.closest('input[type="checkbox"][data-feature]');
  if (cb) {
    const name = cb.dataset.feature;
    const enabled = cb.checked;
    lockFlip(name);  // hold the user's choice while the POST is in flight
    try {
      await api(`/api/set_feature/${encodeURIComponent(name + ':' + enabled)}`,
                { method: 'POST' });
      refresh();
    } catch (err) {
      cb.checked = !enabled;  // revert
      delete _flipLock[name];
      alert('Failed to flip ' + name + ': ' + err.message);
    }
    return;
  }
  const sel = e.target.closest('select.mode-sel[data-mode-source]');
  if (sel) {
    const source = sel.dataset.modeSource;
    const mode = sel.value;
    lockFlip('mode:' + source);
    try {
      await api(`/api/set_routing_mode/${encodeURIComponent(source + ':' + mode)}`,
                { method: 'POST' });
      refresh();
    } catch (err) {
      alert('Failed to set ' + source + ' mode: ' + err.message);
    }
  }
});

function renderLog(s) {
  const lines = (s.log || []).slice(-100).map(t => {
    const cls = t.speaker.includes('DISPATCH (you')
              ? 'self'
              : t.speaker.includes('DISPATCH (system')
              ? 'sys'
              : t.text.startsWith('[hook]') ? 'hook' : 'agent';
    return `<div class="${cls}"><span class="ts">${fmtTime(t.ts)}</span>  ${esc(t.speaker)}: ${esc(t.text)}</div>`;
  });
  const log = $('#log');
  const wasAtBottom = log.scrollHeight - log.scrollTop - log.clientHeight < 40;
  log.innerHTML = lines.join('');
  if (wasAtBottom) log.scrollTop = log.scrollHeight;
}

function esc(s) {
  return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

async function refresh() {
  try {
    state = await api('/state');
    renderHeader(state);
    renderQuotaHeader(state.quota);
    renderQuotaCard(state.quota);
    renderFeaturesPanel(state);
    renderStack(state);
    renderRoster(state);
    renderLog(state);
  } catch (e) {
    $('#pill-channel').textContent = 'disconnected';
  }
}

async function act(action, arg) {
  try {
    const url = `/api/${action}` + (arg ? `/${encodeURIComponent(arg)}` : '');
    await api(url, { method: 'POST' });
    refresh();
  } catch (e) {
    console.error(e);
  }
}

async function promptTransmit(cs) {
  const msg = prompt(`Transmit to ${cs}:`);
  if (!msg) return;
  await api('/api/transmit', { method: 'POST', body: { callsign: cs, message: msg } });
  refresh();
}

// JS-ready marker in the title — if you see this, the new JS loaded.
document.title = 'Dispatch • JS v3 ready';

// Delegated click handler — every button with a data-action attribute is wired.
// The title bar updates on every step so we can see exactly where it fails.
document.addEventListener('click', async (e) => {
  const b = e.target.closest('button[data-action]');
  if (!b) {
    document.title = 'Dispatch • click ignored (' + e.target.tagName + ')';
    return;
  }
  const action = b.dataset.action;
  const arg = b.dataset.arg || '';
  document.title = 'Dispatch • ' + action + (arg ? ':' + arg.slice(0, 10) : '') + ' →';
  // visible feedback so a stuck click is obvious
  const old = b.style.opacity;
  b.style.opacity = '0.4';
  b.style.border = '2px solid #ff8c5b';
  try {
    if (action === 'prompt_transmit') {
      const msg = prompt(`Transmit to ${arg}:`);
      if (msg) {
        const r = await api('/api/transmit', { method: 'POST', body: { callsign: arg, message: msg } });
        document.title = 'Dispatch • transmit ok';
        refresh();
      }
    } else {
      const r = await act(action, arg);
      document.title = 'Dispatch • ' + action + ' ✓';
    }
  } catch (err) {
    document.title = 'Dispatch • ERROR: ' + (err.message || err);
    alert('Action failed: ' + (err.message || err));
  } finally {
    setTimeout(() => {
      b.style.opacity = old || '';
      b.style.border = '';
    }, 250);
  }
});

// Top-bar toolbar wiring (same delegation system — these have data-action now)
$('#btn-talk-all').dataset.action = 'voice_to_all';
$('#btn-status-check').dataset.action = 'status_check';
$('#btn-mute-channel').dataset.action = 'toggle_channel_mute';
$('#btn-mute-all-units').dataset.action = 'toggle_mute_all_units';

// ---- settings gear: toggle the features popover ----
function setSettingsOpen(open) {
  $('#features-panel').classList.toggle('open', open);
  $('#settings-backdrop').classList.toggle('open', open);
  $('#gear-btn').classList.toggle('open', open);
}
$('#gear-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  setSettingsOpen(!$('#features-panel').classList.contains('open'));
});
$('#settings-backdrop').addEventListener('click', () => setSettingsOpen(false));
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') setSettingsOpen(false); });

setInterval(refresh, 1000);
refresh();
</script>
</body>
</html>
